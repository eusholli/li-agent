services:
  li-article-api:
    container_name: li-article-api
    build:
      context: .
    restart: unless-stopped
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WEBAPP_URL: ${WEBAPP_URL}
      CRON_SECRET_KEY: ${CRON_SECRET_KEY}
    networks:
      - webproxy

networks:
  webproxy:
    external: true
